services:
  - type: web
    name: compare-price-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm --workspace apps/api run prisma:generate && npm --workspace apps/api run build
    startCommand: npx prisma db push --schema apps/api/prisma/schema.prisma && npm --workspace apps/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: compare-price-db
          property: connectionString
      - key: LISTING_TTL_MINUTES
        value: 20
      - key: PYTHON_SCRAPER_URL
        fromService:
          name: compare-price-python-scraper
          type: pserv
          property: hostport
      - key: GEMINI_API_KEY
        sync: false

  - type: pserv
    name: compare-price-python-scraper
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r apps/python-scraper/requirements.txt && python -m playwright install --with-deps chromium
    startCommand: cd apps/python-scraper && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_SCRAPER_PORT
        value: 10000
      - key: SERPAPI_KEY
        sync: false
      - key: PROXY_URL
        sync: false
      - key: PROXY_LIST
        sync: false
      - key: SCRAPINGBEE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: compare-price-web
    runtime: static
    buildCommand: npm ci && npm --workspace apps/web run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: compare-price-api
          type: web
          property: host

databases:
  - name: compare-price-db
    databaseName: compare_price
    user: compare_price_user
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
